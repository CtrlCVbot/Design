[desktop]
followUpQueueMode = "steer"
composerEnterBehavior = "cmdIfMultiline"
default-service-tier = "priority"
git-branch-prefix = ""
git-commit-instructions = """
- 커밋 메시지는 Conventional Commits 형식을 사용한다.
  - 허용 접두사: `feat`, `fix`, `refactor`, `docs`, `test`, `chore`, `perf`, `ci`
  - 예: `fix: 로그인 예외 처리 보강`
- `codex/`, `codex:`, `generated-by-codex`처럼 도구명을 드러내는 커밋 형식은 지양한다.
- 커밋 설명과 본문은 한글로 작성한다.
- 한 커밋에는 하나의 논리적 변경만 포함한다.
- 커밋 전에는 repo root, 현재 branch, worktree 상태, nested repo 경계를 확인한다.
- 커밋 전에는 `git config --local user.name`과 `git config --local user.email`을 확인한다.
- 사용자 확인 없이 `git config --global` 값을 변경하지 않는다.
- 기본적으로 `Co-Authored-By: Claude ...` 또는 자동 생성 도구 서명은 추가하지 않는다.
- 커밋 전 검증 가능한 테스트나 빌드가 있으면 실행하고, 실행하지 못한 경우 이유를 보고한다.
- 사용자가 만들었거나 요청 범위 밖에 있는 변경은 되돌리지 않는다."""
git-pr-instructions = """
- PR 제목은 Conventional Commits 형식을 우선 사용한다.
  - 예: `feat: 결제 내역 필터 추가`
- PR 제목, 본문, 브랜치명에 `codex/`, `codex:`, `generated-by-codex`처럼 도구명을 드러내는 형식은 지양한다.
- PR 작성 전 전체 커밋 이력과 `git diff [base-branch]...HEAD`를 확인한다.
- PR 본문에는 변경 요약, 테스트 결과, 남은 TODO 또는 리스크를 포함한다.
- 관련 이슈가 있으면 PR 본문에 연결한다.
- 테스트를 실행하지 못한 경우, 실행하지 못한 이유와 남은 검증 방법을 명시한다.
- PR은 하나의 목적 또는 기능 단위로 작게 유지한다.
- unrelated diff나 사용자가 만든 기존 변경은 PR 범위에 섞지 않는다."""

