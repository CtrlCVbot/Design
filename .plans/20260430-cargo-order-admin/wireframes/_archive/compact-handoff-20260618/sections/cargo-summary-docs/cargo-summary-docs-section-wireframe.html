<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>화물정보 요약 섹션 와이어프레임</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Pen+Script&family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1f2328;
    --ink-soft: #44494f;
    --ink-mute: #858b93;
    --line: #2b2f33;
    --line-soft: #b9bdc2;
    --paper: #fbfaf6;
    --paper-2: #f3f1e9;
    --rule: #d8d4c6;
    --note: #b27a00;
    --note-bg: #fff7d6;
    --ok: #2b6cb0;
    --ok-bg: #e6eef7;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: #efece2;
    color: var(--ink);
    font-family: "Gaegu", "Nanum Pen Script", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.28;
  }

  body {
    padding: 24px 16px 80px;
  }

  button,
  input {
    font: inherit;
  }

  .sheet {
    width: min(1180px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 16px 18px 22px;
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 4px;
    box-shadow: 6px 8px 0 rgba(0, 0, 0, 0.08);
  }

  .mast {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  h1 {
    margin: 0;
    font-family: "Nanum Pen Script", "Gaegu", cursive;
    font-size: 34px;
    line-height: 1;
  }

  .mast-note {
    margin-top: 4px;
    color: var(--ink-mute);
    font-size: 14px;
  }

  .source-list {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    padding: 1px 8px;
    border: 1.1px solid var(--line);
    border-radius: 999px;
    background: #fffefb;
    color: var(--ink-soft);
    font-size: 13px;
    white-space: nowrap;
  }

  .state-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 16px;
    padding: 8px;
    border: 1.25px solid var(--line);
    border-radius: 4px;
    background: var(--paper-2);
  }

  .state-tabs button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 28px;
    padding: 2px 9px;
    border: 1.15px solid var(--line);
    border-radius: 3px;
    background: #fffefb;
    color: var(--ink);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  .state-tabs button:hover,
  .state-tabs button:focus {
    outline: 1px dashed var(--note);
    outline-offset: -2px;
    background: var(--note-bg);
  }

  .state-tabs button.is-active {
    background: var(--ok-bg);
    color: var(--ok);
    border-color: var(--ok);
  }

  .section-block {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1.5px solid var(--line);
  }

  .section-title {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin: 0 0 8px;
    font-family: "Nanum Pen Script", "Gaegu", cursive;
    font-size: 27px;
    font-weight: 700;
  }

  .section-title .num {
    margin-right: 5px;
    color: var(--ink-mute);
    font-family: "Gaegu", sans-serif;
    font-size: 14px;
    font-weight: 700;
  }

  .section-note {
    margin: 0 0 10px auto;
    width: fit-content;
    max-width: 100%;
    padding: 2px 7px;
    border: 1px dashed var(--note);
    border-radius: 3px;
    background: var(--note-bg);
    color: var(--note);
    font-family: "Caveat", "Gaegu", cursive;
    font-size: 15px;
  }

  .summary-panel {
    display: grid;
    gap: 8px;
  }

  .summary-card {
    border: 1.25px solid var(--line);
    border-radius: 4px;
    background: #fffefb;
    overflow-x: hidden;
    overflow-y: hidden;
  }

  .summary-row {
    display: grid;
    grid-template-columns: 48px minmax(0, 1fr) 72px;
    gap: 7px;
    align-items: center;
    min-width: 0;
    padding: 5px 8px;
    transition: background-color 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
  }

  .summary-row:focus-within,
  .summary-row.row-focused {
    background: #fff9e7;
    box-shadow: inset 0 0 0 1px rgba(178, 122, 0, .18);
  }

  .kind {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 24px;
    padding: 1px 7px;
    border: 1.15px solid var(--line);
    border-radius: 999px;
    background: #efe6c2;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }

  .cell {
    min-width: 0;
    padding: 3px 4px;
    border-bottom: 1px dotted transparent;
  }

  .cell-label {
    color: var(--ink-mute);
    font-size: 12px;
    font-weight: 700;
  }

  .cell-value {
    min-height: 22px;
    color: var(--ink);
    font-family: "Caveat", "Gaegu", cursive;
    font-size: 19px;
    font-weight: 700;
    white-space: normal;
    overflow: visible;
    text-overflow: clip;
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  .cell-value.placeholder {
    color: var(--ink-mute);
  }

  .summary-value {
    position: relative;
    display: block;
    min-height: 27px;
    padding: 2px 4px;
    border-radius: 3px;
    cursor: text;
  }

  .summary-value:hover,
  .summary-value:focus {
    outline: 1px dashed var(--note);
    outline-offset: -1px;
    background: var(--note-bg);
  }

  .summary-input {
    width: 100%;
    min-height: 27px;
    padding: 2px 6px;
    border: 1px dashed var(--note);
    border-radius: 3px;
    background: var(--note-bg);
    color: var(--ink);
    font-family: "Caveat", "Gaegu", cursive;
    font-size: 19px;
    font-weight: 700;
    outline: none;
  }

  .row-action {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 27px;
    padding: 2px 8px;
    border: 1.15px solid var(--line);
    border-radius: 3px;
    background: #fff;
    color: var(--ink);
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    cursor: pointer;
  }

  .row-action:hover,
  .row-action:focus {
    outline: 1px dashed var(--note);
    outline-offset: -2px;
    background: var(--note-bg);
  }

  .row-action[disabled] {
    color: var(--ink-mute);
    cursor: default;
    background: #f6f4ec;
  }

  .summary-row.change-absorbing {
    animation: motionSoftHighlight 620ms ease forwards;
  }

  .summary-row.change-absorbing .row-action {
    animation: absorbToLabel 420ms ease-in forwards;
  }

  @keyframes absorbToLabel {
    0% {
      opacity: 1;
      transform: translateX(0) scale(1);
    }
    80% {
      opacity: .18;
      transform: translateX(var(--absorb-x, -80px)) scale(.9);
    }
    100% {
      opacity: 0;
      transform: translateX(var(--absorb-x, -80px)) scale(.86);
    }
  }

  @keyframes motionSoftHighlight {
    0% {
      background: #fffefb;
    }
    45% {
      background: var(--ok-bg);
    }
    100% {
      background: #fffefb;
    }
  }

  @media (max-width: 760px) {
    body {
      padding: 12px 8px 60px;
    }

    .sheet {
      width: calc(100vw - 16px);
      padding: 12px;
    }

    .source-list {
      justify-content: flex-start;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      transition: none !important;
      animation: none !important;
    }
  }
</style>
</head>
<body>
  <main class="sheet">
    <header class="mast">
      <div>
        <h1>화물정보 요약 섹션 와이어프레임</h1>
        <div class="mast-note">운송구간·화주 정보와 동일한 한 줄 row 기준</div>
      </div>
      <div class="source-list" aria-label="기준 자료">
        <span class="badge">B Original Tone</span>
        <span class="badge">운송구간 row</span>
        <span class="badge">화주 정보 row</span>
      </div>
    </header>

    <nav class="state-tabs" aria-label="화물정보 요약 상태 보기">
      <button type="button" class="is-active" data-mode="ready">값 있음</button>
      <button type="button" data-mode="empty">값 없음</button>
      <button type="button" data-mode="editing">수정 중</button>
    </nav>

    <section class="section-block summary-section" aria-labelledby="summary-title">
      <div class="section-title" id="summary-title"><span class="num">3</span>화물정보 요약</div>
      <div class="section-note">화물 운송정보에서 생성되는 요약 row</div>

      <div class="summary-panel">
        <div class="summary-card" aria-label="화물정보 요약 한 줄 row">
          <div class="summary-row" data-summary-row>
            <span class="kind">요약</span>
            <div class="cell">
              <div class="cell-label">화물정보 요약</div>
              <div class="cell-value summary-value" data-summary-value tabindex="0">지금상 당착 장비 운송 지/지-A. 판넬 12파렛트, 5.5톤 축차, 상하차 지게차 조건.</div>
            </div>
            <button class="row-action" type="button" data-summary-edit>수정</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const state = {
      ready: {
        value: "지금상 당착 장비 운송 지/지-A. 판넬 12파렛트, 5.5톤 축차, 상하차 지게차 조건.",
        placeholder: false,
        action: "수정",
        disabled: false,
        editing: false
      },
      empty: {
        value: "운송 정보 입력 후 요약됩니다",
        placeholder: true,
        action: "요약 대기",
        disabled: true,
        editing: false
      },
      editing: {
        value: "지금상 당착 장비 운송 지/지-A. 판넬 12파렛트, 5.5톤 축차, 상하차 지게차 조건.",
        placeholder: false,
        action: "저장",
        disabled: false,
        editing: true
      }
    };

    const row = document.querySelector("[data-summary-row]");
    const valueEl = document.querySelector("[data-summary-value]");
    const editButton = document.querySelector("[data-summary-edit]");

    const renderValue = (mode) => {
      const next = state[mode];
      valueEl.classList.toggle("placeholder", next.placeholder);
      editButton.textContent = next.action;
      editButton.disabled = next.disabled;

      if (next.editing) {
        valueEl.innerHTML = "";
        const input = document.createElement("input");
        input.className = "summary-input";
        input.value = next.value;
        input.setAttribute("aria-label", "화물정보 요약 수정");
        valueEl.append(input);
        window.setTimeout(() => input.focus(), 0);
        return;
      }

      valueEl.textContent = next.value;
    };

    const applyMode = (mode) => {
      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.mode === mode);
      });
      row.classList.toggle("row-focused", mode === "editing");
      renderValue(mode);
    };

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => applyMode(button.dataset.mode));
    });

    editButton.addEventListener("click", () => {
      if (editButton.disabled) return;

      const input = valueEl.querySelector("input");
      if (input) {
        state.ready.value = input.value.trim() || state.empty.value;
        row.classList.remove("row-focused");
        applyMode("ready");
        return;
      }

      row.classList.add("change-absorbing");
      window.setTimeout(() => {
        row.classList.remove("change-absorbing");
        applyMode("editing");
      }, 420);
    });

    valueEl.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      if (!editButton.disabled) editButton.click();
    });
  </script>
</body>
</html>
